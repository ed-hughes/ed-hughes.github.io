<!doctype html>
<html>
  <head>
    <script src="https://cdn.jotfor.ms/s/umd/latest/for-custom-widgets.js"></script>
    <meta http-equiv="cache-control" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <meta http-equiv="pragma" content="no-cache" />
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-size: 13px;
        padding: 10px;
        background: transparent;
        margin: 0;
      }
      #file-input { margin-bottom: 10px; display: block; }
      #preview { margin-top: 10px; display: none; }
      #preview img { max-width: 100%; max-height: 200px; border-radius: 6px; }
      #log {
        margin-top: 10px;
        background: #1e1e1e;
        color: #d4d4d4;
        font-family: monospace;
        font-size: 11px;
        padding: 10px;
        border-radius: 6px;
        white-space: pre-wrap;
        word-break: break-all;
        max-height: 300px;
        overflow-y: auto;
      }
    </style>
  </head>
  <body>
    <input type="file" id="file-input" accept="image/*" disabled>
    <div id="preview"><img id="preview-img" src="" alt="preview"></div>
    <div id="log">Waiting for ready event...</div>

    <script>
      (function () {
        var formID, qid, uploadServerURL, folder;

        function log(label, data) {
          var el = document.getElementById('log');
          var time = new Date().toISOString().split('T')[1].replace('Z', '');
          var value = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
          el.innerHTML += '\n[' + time + '] <b style="color:#569cd6">' + label + '</b>: ' + value;
          el.scrollTop = el.scrollHeight;
          console.log('[' + label + ']', data);
        }

        function generateFolder(formID) {
          return formID + '_' + Math.random().toString(16).substr(2, 13);
        }

        JFCustomWidget.subscribe("ready", function (data) {
          formID = data.formID;
          qid = data.qid;
          uploadServerURL = data.uploadServerURL || 'https://demo.jotform.com/upload';
          folder = generateFolder(formID);

          log('ready', { formID: formID, qid: qid, uploadServerURL: uploadServerURL, folder: folder });

          document.getElementById('file-input').disabled = false;

          JFCustomWidget.subscribe("submit", function () {
            JFCustomWidget.sendSubmit({ valid: true, value: "test" });
          });

          JFCustomWidget.requestFrameResize({ height: document.body.scrollHeight + 20 });
        });

        document.getElementById('file-input').addEventListener('change', function (e) {
          var file = e.target.files[0];
          if (!file) return;
          log('file-selected', { name: file.name, type: file.type, size: file.size });
          uploadFile(file);
          e.target.value = '';
        });

        function uploadFile(file) {
          var field = 'q' + qid + '_widget';
          var params = [
            'action=multipleUpload',
            'field=' + encodeURIComponent(field),
            'folder=' + encodeURIComponent(folder),
            'name=' + encodeURIComponent(file.name),
            'qqfile=' + encodeURIComponent(file.name)
          ].join('&');

          var url = uploadServerURL + '?' + params;
          log('uploading', url);

          fetch(url, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/octet-stream',
              'X-Requested-With': 'XMLHttpRequest',
              'X-File-Name': encodeURIComponent(file.name)
            },
            body: file
          })
          .then(function (res) {
            log('response-status', res.status + ' ' + res.statusText);
            return res.json();
          })
          .then(function (response) {
            log('upload-response', response);

            if (response.success) {
              var origin = uploadServerURL.replace('/upload', '');
              var url = origin + response.message + '?ufs=jotformWidgets';
              log('constructed-url', url);

              var img = document.getElementById('preview-img');
              img.onload = function () {
                log('url-valid', '✅ Image loaded successfully from URL');
                document.getElementById('preview').style.display = 'block';
                JFCustomWidget.requestFrameResize({ height: document.body.scrollHeight + 20 });
              };
              img.onerror = function () {
                log('url-invalid', '❌ Image failed to load from URL');
              };
              img.src = url;
            } else {
              log('upload-failed', response);
            }

            JFCustomWidget.requestFrameResize({ height: document.body.scrollHeight + 20 });
          })
          .catch(function (err) {
            log('fetch-error', err.toString());
            JFCustomWidget.requestFrameResize({ height: document.body.scrollHeight + 20 });
          });
        }
      })();
    </script>
  </body>
</html>
