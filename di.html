<!doctype html>
<html>
<head>
  <script src="https://cdn.jotfor.ms/s/umd/latest/for-custom-widgets.js"></script>
  <meta http-equiv="cache-control" content="no-cache" />
  <meta http-equiv="expires" content="0" />
  <meta http-equiv="pragma" content="no-cache" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: transparent;
      padding: 12px;
      color: #1a1a2e;
    }

    /* Upload Zone */
    .upload-zone {
      border: 2px dashed #cbd5e1;
      border-radius: 12px;
      padding: 32px 20px;
      text-align: center;
      background: #f8fafc;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    .upload-zone:hover,
    .upload-zone.dragover {
      border-color: #6366f1;
      background: #eef2ff;
    }
    .upload-zone__icon {
      font-size: 36px;
      margin-bottom: 10px;
      display: block;
    }
    .upload-zone__title {
      font-size: 15px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 4px;
    }
    .upload-zone__hint {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 14px;
    }
    .upload-zone__btn {
      display: inline-block;
      background: #6366f1;
      color: #fff;
      border: none;
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .upload-zone__btn:hover { background: #4f46e5; }
    #file-input { display: none; }

    /* Carousel */
    .carousel {
      display: none;
      border-radius: 12px;
      overflow: hidden;
      background: #0f0f0f;
      position: relative;
    }

    .carousel__stage {
      position: relative;
      width: 100%;
      height: 280px;
      overflow: hidden;
    }

    .carousel__track {
      display: flex;
      height: 100%;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .carousel__slide {
      min-width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .carousel__slide img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    /* Nav buttons */
    .carousel__nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: background 0.2s;
    }
    .carousel__nav:hover { background: rgba(255,255,255,0.3); }
    .carousel__nav--prev { left: 10px; }
    .carousel__nav--next { right: 10px; }
    .carousel__nav.hidden { display: none; }

    /* Counter */
    .carousel__counter {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.55);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.05em;
      pointer-events: none;
    }

    /* Delete button */
    .carousel__delete {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(220,38,38,0.8);
      color: #fff;
      border: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-size: 15px;
      line-height: 1;
      cursor: pointer;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .carousel__delete:hover { background: rgba(220,38,38,1); }

    /* Thumbnails */
    .thumbnails {
      display: flex;
      gap: 6px;
      padding: 10px;
      background: #1a1a2e;
      overflow-x: auto;
      scrollbar-width: thin;
      scrollbar-color: #4f46e5 transparent;
    }
    .thumbnails::-webkit-scrollbar { height: 3px; }
    .thumbnails::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 2px; }

    .thumbnail {
      width: 52px;
      height: 52px;
      border-radius: 6px;
      object-fit: cover;
      cursor: pointer;
      opacity: 0.5;
      border: 2px solid transparent;
      transition: opacity 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }
    .thumbnail.active {
      opacity: 1;
      border-color: #6366f1;
    }

    /* Add more button in thumbnail strip */
    .thumbnail-add {
      width: 52px;
      height: 52px;
      border-radius: 6px;
      border: 2px dashed rgba(255,255,255,0.25);
      background: transparent;
      color: rgba(255,255,255,0.5);
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.2s, color 0.2s;
    }
    .thumbnail-add:hover {
      border-color: #6366f1;
      color: #6366f1;
    }

    /* Error */
    .error-msg {
      display: none;
      color: #dc2626;
      font-size: 12px;
      margin-top: 6px;
      text-align: center;
    }
    .error-msg.visible { display: block; }

    /* View-only mode — no delete, no add, no thumbnails strip actions */
    body.view-only .carousel__delete { display: none; }
    body.view-only .thumbnail-add { display: none; }
    body.view-only .thumbnails { background: #111; }

    /* Static/table mode — single image, compact */
    body.static-mode .carousel__stage { height: 160px; }
    body.static-mode .thumbnails { display: none; }
    body.static-mode .carousel__delete { display: none; }
    body.static-mode .thumbnail-add { display: none; }
  </style>
</head>
<body>

  <!-- Upload zone -->
  <div class="upload-zone" id="drop-zone">
    <span class="upload-zone__icon">🖼️</span>
    <div class="upload-zone__title">Drag & drop images here</div>
    <div class="upload-zone__hint">PNG, JPG, GIF, WebP supported</div>
    <button class="upload-zone__btn" type="button" id="browse-btn">Browse Files</button>
    <input type="file" id="file-input" multiple accept="image/*">
  </div>

  <div class="error-msg" id="error-msg"></div>

  <!-- Carousel -->
  <div class="carousel" id="carousel">
    <div class="carousel__stage">
      <button class="carousel__nav carousel__nav--prev hidden" id="nav-prev">&#8249;</button>
      <button class="carousel__nav carousel__nav--next hidden" id="nav-next">&#8250;</button>
      <div class="carousel__track" id="track"></div>
      <div class="carousel__counter" id="counter"></div>
    </div>
    <div class="thumbnails" id="thumbnails"></div>
  </div>

  <script>
    (function () {
      var images = []; // [{name, base64}]
      var currentIndex = 0;
      var isRequired = false;

      // --- Helpers ---

      function showError(msg) {
        var el = document.getElementById('error-msg');
        el.textContent = msg;
        el.classList.add('visible');
        setTimeout(function () { el.classList.remove('visible'); }, 4000);
      }

      function buildMetadataValue() {
        if (images.length === 0) return '';
        return JFCustomWidgetUtils.buildMetadata('imagelinks', images.map(function (img) {
          var isDataUri = img.base64 && img.base64.indexOf('data:') === 0;
          if (isDataUri) {
            return { name: img.name, base64: img.base64 };
          } else {
            return { name: img.name, url: JFCustomWidgetUtils.getS3UriRelativePath(img.base64) };
          }
        }));
      }

      function sendCurrentValue() {
        JFCustomWidget.sendData({ value: buildMetadataValue() });
      }

      function resize() {
        setTimeout(function () {
          JFCustomWidget.requestFrameResize({ height: document.body.scrollHeight + 20 });
        }, 50);
      }

      // --- Carousel rendering ---

      function renderCarousel() {
        var carousel = document.getElementById('carousel');
        var track = document.getElementById('track');
        var thumbnails = document.getElementById('thumbnails');
        var dropZone = document.getElementById('drop-zone');

        if (images.length === 0) {
          carousel.style.display = 'none';
          dropZone.style.display = 'block';
          resize();
          return;
        }

        dropZone.style.display = 'none';
        carousel.style.display = 'block';

        if (currentIndex >= images.length) currentIndex = images.length - 1;

        // Build slides
        track.innerHTML = '';
        images.forEach(function (img, i) {
          var slide = document.createElement('div');
          slide.className = 'carousel__slide';

          var image = document.createElement('img');
          image.src = img.base64;
          image.alt = img.name;

          var deleteBtn = document.createElement('button');
          deleteBtn.className = 'carousel__delete';
          deleteBtn.innerHTML = '&times;';
          deleteBtn.title = 'Remove image';
          deleteBtn.setAttribute('data-index', i);
          deleteBtn.addEventListener('click', function () {
            deleteImage(parseInt(this.getAttribute('data-index')));
          });

          slide.appendChild(image);
          slide.appendChild(deleteBtn);
          track.appendChild(slide);
        });

        // Build thumbnails
        thumbnails.innerHTML = '';
        images.forEach(function (img, i) {
          var thumb = document.createElement('img');
          thumb.src = img.base64;
          thumb.alt = img.name;
          thumb.className = 'thumbnail' + (i === currentIndex ? ' active' : '');
          thumb.setAttribute('data-index', i);
          thumb.addEventListener('click', function () {
            goToSlide(parseInt(this.getAttribute('data-index')));
          });
          thumbnails.appendChild(thumb);
        });

        // Add more button in thumbnails
        var addBtn = document.createElement('button');
        addBtn.className = 'thumbnail-add';
        addBtn.innerHTML = '+';
        addBtn.title = 'Add more images';
        addBtn.addEventListener('click', function () {
          document.getElementById('file-input').click();
        });
        thumbnails.appendChild(addBtn);

        // Nav visibility
        var showNav = images.length > 1;
        document.getElementById('nav-prev').classList.toggle('hidden', !showNav);
        document.getElementById('nav-next').classList.toggle('hidden', !showNav);

        goToSlide(currentIndex);
        resize();
      }

      function goToSlide(index) {
        currentIndex = index;
        var track = document.getElementById('track');
        track.style.transform = 'translateX(-' + (currentIndex * 100) + '%)';

        // Update counter
        document.getElementById('counter').textContent = (currentIndex + 1) + ' / ' + images.length;

        // Update thumbnails
        document.querySelectorAll('.thumbnail').forEach(function (t, i) {
          t.classList.toggle('active', i === currentIndex);
        });
      }

      function moveSlide(dir) {
        var next = currentIndex + dir;
        if (next < 0) next = images.length - 1;
        if (next >= images.length) next = 0;
        goToSlide(next);
      }

      function deleteImage(index) {
        images.splice(index, 1);
        if (currentIndex >= images.length) currentIndex = Math.max(0, images.length - 1);
        renderCarousel();
        sendCurrentValue();
      }

      // --- File handling ---

      function processFiles(files) {
        var imageFiles = Array.from(files).filter(function (f) {
          return f.type.startsWith('image/');
        });

        if (imageFiles.length === 0) {
          showError('Please select image files only.');
          return;
        }

        var processed = 0;

        imageFiles.forEach(function (file) {
          var reader = new FileReader();
          reader.onload = function (e) {
            images.push({
              name: file.name,
              base64: e.target.result
            });
            processed++;
            if (processed === imageFiles.length) {
              currentIndex = images.length - 1;
              renderCarousel();
              sendCurrentValue();
            }
          };
          reader.readAsDataURL(file);
        });
      }

      // --- Event wiring ---

      document.getElementById('browse-btn').addEventListener('click', function () {
        document.getElementById('file-input').click();
      });

      document.getElementById('file-input').addEventListener('change', function (e) {
        if (e.target.files.length) processFiles(e.target.files);
        e.target.value = '';
      });

      var dropZone = document.getElementById('drop-zone');
      dropZone.addEventListener('dragover', function (e) {
        e.preventDefault();
        dropZone.classList.add('dragover');
      });
      dropZone.addEventListener('dragleave', function () {
        dropZone.classList.remove('dragover');
      });
      dropZone.addEventListener('drop', function (e) {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) processFiles(e.dataTransfer.files);
      });

      document.getElementById('nav-prev').addEventListener('click', function () { moveSlide(-1); });
      document.getElementById('nav-next').addEventListener('click', function () { moveSlide(1); });

      // --- Widget lifecycle ---

      JFCustomWidget.subscribe('ready', function (data) {
        isRequired = JFCustomWidget.isWidgetRequired();

        // Static mode — widget is being viewed in tables/submission view
        // isWidgetStatic() is true when rendered in the submissions table
        var isStatic = JFCustomWidget.isWidgetStatic();

        // Edit mode — form loaded with an existing submission value
        var isEditMode = data.isEditMode || (data.value && data.value.length > 0);

        if (isStatic) {
          document.body.classList.add('static-mode', 'view-only');
        } else if (isEditMode) {
          document.body.classList.add('view-only');
        }

        // Restore saved value (edit mode or static)
        if (data.value && JFCustomWidgetUtils.hasMetadata(data.value)) {
          var extracted = JFCustomWidgetUtils.extractMetadata(data.value);
          if (extracted && extracted.length > 0) {
            images = extracted.map(function (item) {
              var src = item.base64 || '';
              if (!src && item.url) {
                src = JFCustomWidgetUtils.fixS3UriOrigin(item.url);
              }
              return { name: item.name, base64: src };
            }).filter(function (img) { return !!img.base64; });
            currentIndex = 0;
            if (images.length > 0) renderCarousel();
          }
        }

        // In static mode with no value — show nothing
        if (isStatic && images.length === 0) {
          document.getElementById('drop-zone').style.display = 'none';
          resize();
          return;
        }

        JFCustomWidget.subscribe('submit', function () {
          var value = buildMetadataValue();
          var valid = !isRequired || images.length > 0;

          console.log('[submit] images:', images.length);
          console.log('[submit] value preview:', value ? value.substring(0, 300) : 'empty');

          if (!valid) {
            JFCustomWidget.showWidgetError(JFCustomWidget.texts.required || 'This field is required.');
          } else {
            JFCustomWidget.hideWidgetError();
          }

          JFCustomWidget.sendSubmit({ valid: valid, value: value });
        });

        JFCustomWidget.subscribe('clear', function () {
          images = [];
          currentIndex = 0;
          document.body.classList.remove('view-only');
          renderCarousel();
          sendCurrentValue();
        });

        resize();
      });

    })();
  </script>
</body>
</html>
