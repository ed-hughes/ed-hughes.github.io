<!doctype html>
<html>
  <head>
    <script src="https://cdn.jotfor.ms/s/umd/latest/for-custom-widgets.js"></script>
    <meta http-equiv="cache-control" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <meta http-equiv="pragma" content="no-cache" />
    <style>
      body {
        font-family: monospace;
        font-size: 11px;
        padding: 10px;
        background: transparent;
        margin: 0;
      }
      #log {
        background: #1e1e1e;
        color: #d4d4d4;
        padding: 10px;
        border-radius: 6px;
        white-space: pre-wrap;
        word-break: break-all;
        max-height: 400px;
        overflow-y: auto;
      }
      .key { color: #9cdcfe; }
      .val { color: #ce9178; }
      .label { color: #569cd6; font-weight: bold; }
      .time { color: #6a9955; }
    </style>
  </head>
  <body>
    <div id="log">Waiting for ready event...</div>
    <script>
      (function () {
        function log(label, data) {
          var el = document.getElementById('log');
          var time = new Date().toISOString().split('T')[1].replace('Z', '');

          var html = '\n<span class="time">[' + time + ']</span> <span class="label">' + label + '</span>:\n';

          if (typeof data === 'object' && data !== null) {
            Object.keys(data).forEach(function (key) {
              var val = data[key];
              var valStr = (typeof val === 'object') ? JSON.stringify(val) : String(val);
              // Truncate very long values (e.g. base64) but show the start
              if (valStr.length > 300) {
                valStr = valStr.substring(0, 300) + '... [truncated, total length: ' + valStr.length + ']';
              }
              html += '  <span class="key">' + key + '</span>: <span class="val">' + valStr + '</span>\n';
            });
          } else {
            html += '  ' + String(data) + '\n';
          }

          el.innerHTML += html;
          el.scrollTop = el.scrollHeight;
          console.log('[' + label + ']', data);
        }

        JFCustomWidget.subscribe("ready", function (data) {
          log('ready', data);
          JFCustomWidget.requestFrameResize({ height: document.body.scrollHeight + 20 });

          JFCustomWidget.subscribe("submit", function () {
            log('submit', { triggered: true });
            JFCustomWidget.sendSubmit({ valid: true, value: "test" });
          });

          JFCustomWidget.subscribe("populate", function (populateData) {
            log('populate', populateData);
            JFCustomWidget.requestFrameResize({ height: document.body.scrollHeight + 20 });
          });

          JFCustomWidget.subscribe("clear", function (clearData) {
            log('clear', clearData);
            JFCustomWidget.requestFrameResize({ height: document.body.scrollHeight + 20 });
          });
        });
      })();
    </script>
  </body>
</html>
