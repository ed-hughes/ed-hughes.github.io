<!doctype html>
<html>
  <head>
    <script src="https://cdn.jotfor.ms/s/umd/latest/for-custom-widgets.js"></script>
    <meta http-equiv="cache-control" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <meta http-equiv="pragma" content="no-cache" />
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-size: 13px;
        padding: 10px;
        background: transparent;
        margin: 0;
      }
      #file-input { margin-bottom: 10px; display: block; }
      #preview { margin-top: 10px; display: none; }
      #preview img { max-width: 100%; max-height: 200px; border-radius: 6px; }
      #status { margin-top: 8px; font-size: 12px; color: #666; }
      #log {
        margin-top: 10px;
        background: #1e1e1e;
        color: #d4d4d4;
        font-family: monospace;
        font-size: 11px;
        padding: 10px;
        border-radius: 6px;
        white-space: pre-wrap;
        word-break: break-all;
        max-height: 300px;
        overflow-y: auto;
      }
    </style>
  </head>
  <body>
    <input type="file" id="file-input" accept="image/*" disabled>
    <div id="status"></div>
    <div id="preview"><img id="preview-img" src="" alt="preview"></div>
    <div id="log">Waiting for ready event...</div>

    <script>
      (function () {
        var currentBase64 = null;
        var currentFileName = null;

        function log(label, data) {
          var el = document.getElementById('log');
          var time = new Date().toISOString().split('T')[1].replace('Z', '');
          var value = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
          // Truncate long base64 strings in the log
          if (value.length > 200) value = value.substring(0, 200) + '... [truncated]';
          el.innerHTML += '\n[' + time + '] <b style="color:#569cd6">' + label + '</b>: ' + value;
          el.scrollTop = el.scrollHeight;
          console.log('[' + label + ']', data);
        }

        function buildValue() {
          if (!currentBase64 || !currentFileName) return '';
          return JFCustomWidgetUtils.buildMetadata('imagelinks', [{
            name: currentFileName,
            base64: currentBase64
          }]);
        }

        JFCustomWidget.subscribe("ready", function (data) {
          log('ready', { formID: data.formID, value: data.value ? 'has value' : 'no value' });

          // Restore existing value on edit
          if (data.value && JFCustomWidgetUtils.hasMetadata(data.value)) {
            var extracted = JFCustomWidgetUtils.extractMetadata(data.value);
            if (extracted && extracted[0]) {
              var item = extracted[0];
              currentFileName = item.name;
              currentBase64 = item.base64 || item.url;
              log('restored', { name: currentFileName });
              document.getElementById('preview-img').src = currentBase64;
              document.getElementById('preview').style.display = 'block';
              document.getElementById('status').textContent = 'Image: ' + currentFileName;
            }
          }

          document.getElementById('file-input').disabled = false;

          JFCustomWidget.subscribe("submit", function () {
            var value = buildValue();
            log('submit', { hasValue: !!value });
            JFCustomWidget.sendSubmit({
              valid: !JFCustomWidget.isWidgetRequired() || !!value,
              value: value
            });
          });

          JFCustomWidget.requestFrameResize({ height: document.body.scrollHeight + 20 });
        });

        document.getElementById('file-input').addEventListener('change', function (e) {
          var file = e.target.files[0];
          if (!file) return;
          log('file-selected', { name: file.name, size: file.size });

          var reader = new FileReader();
          reader.onload = function (event) {
            currentBase64 = event.target.result; // full data URI e.g. "data:image/png;base64,..."
            currentFileName = file.name;

            // Show preview immediately using blob URL
            document.getElementById('preview-img').src = currentBase64;
            document.getElementById('preview').style.display = 'block';
            document.getElementById('status').textContent = 'Image: ' + currentFileName;

            log('base64-ready', 'length: ' + currentBase64.length);

            // Send data to form immediately
            var value = buildValue();
            JFCustomWidget.sendData({ value: value });
            log('sent-data', 'metadata sent to form');

            JFCustomWidget.requestFrameResize({ height: document.body.scrollHeight + 20 });
          };
          reader.readAsDataURL(file);
          e.target.value = '';
        });

        JFCustomWidget.subscribe("clear", function () {
          currentBase64 = null;
          currentFileName = null;
          document.getElementById('preview').style.display = 'none';
          document.getElementById('preview-img').src = '';
          document.getElementById('status').textContent = '';
          JFCustomWidget.sendData({ value: '' });
          JFCustomWidget.requestFrameResize({ height: document.body.scrollHeight + 20 });
        });
      })();
    </script>
  </body>
</html>
