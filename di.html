
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Multiple Image Carousel Upload</title>
    <!-- Load Jotform Custom Widget API -->
    <script src="https://cdn.jotfor.ms/s/umd/latest/for-custom-widgets.js"></script>

    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            background: transparent;
        }

        .widget-container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Upload Area Styles */
        .upload-area {
            border: 2px dashed #c3cad8;
            border-radius: 8px;
            padding: 30px 20px;
            text-align: center;
            background-color: #f8f9fa;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: #007bff;
            background-color: #f1f7ff;
        }

        .upload-icon {
            font-size: 32px;
            color: #6c757d;
            margin-bottom: 10px;
        }

        .upload-text {
            color: #495057;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .upload-hint {
            color: #6c757d;
            font-size: 12px;
        }

        #file-input {
            display: none;
        }

        .btn-browse {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-browse:hover {
            background-color: #0056b3;
        }

        /* Carousel Styles */
        .carousel-container {
            position: relative;
            width: 100%;
            height: 300px;
            background-color: #e9ecef;
            border-radius: 8px;
            overflow: hidden;
            display: none; /* Hidden until images are uploaded */
        }

        .carousel-track {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.4s ease-in-out;
        }

        .carousel-slide {
            min-width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .carousel-slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* Navigation Arrows */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }

        .nav-btn:hover {
            background-color: rgba(0, 0, 0, 0.8);
        }

        .nav-prev {
            left: 10px;
        }

        .nav-next {
            right: 10px;
        }

        /* Image Counter & Delete */
        .slide-info {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 14px;
        }

        .btn-delete {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgba(220, 53, 69, 0.8);
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            z-index: 10;
        }

        .btn-delete:hover {
            background-color: rgba(220, 53, 69, 1);
        }

        /* Thumbnail Strip */
        .thumbnails {
            display: flex;
            gap: 8px;
            margin-top: 15px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .thumbnail {
            width: 60px;
            height: 60px;
            border-radius: 4px;
            object-fit: cover;
            cursor: pointer;
            opacity: 0.6;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .thumbnail.active {
            opacity: 1;
            border-color: #007bff;
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <!-- Upload Area -->
        <div class="upload-area" id="drop-zone">
            <div class="upload-icon">📸</div>
            <div class="upload-text">Drag & drop images here</div>
            <div class="upload-hint">or</div>
            <button class="btn-browse" onclick="document.getElementById('file-input').click()">Browse Files</button>
            <input type="file" id="file-input" multiple accept="image/*">
        </div>

        <!-- Carousel Area -->
        <div class="carousel-container" id="carousel">
            <button class="nav-btn nav-prev" id="btn-prev" onclick="moveSlide(-1)">&#10094;</button>
            <button class="nav-btn nav-next" id="btn-next" onclick="moveSlide(1)">&#10095;</button>
            
            <div class="carousel-track" id="track">
                <!-- Slides will be injected here -->
            </div>
        </div>

        <!-- Thumbnails -->
        <div class="thumbnails" id="thumbnails">
            <!-- Thumbnails will be injected here -->
        </div>
    </div>

    <script>
        (function () {
            // Global variables
            let uploadedImages = []; // Array to store image data
            let currentSlide = 0;
            let isRequired = false;

            // --- Metadata Helpers ---

            // Builds the imagelinks metadata string that Jotform's backend
            // knows how to parse and render (as <img> tags wrapped in <a> tags).
            function buildImageMetadata() {
                if (uploadedImages.length === 0) return "";

                const imageLinks = uploadedImages.map(function (img) {
                    return {
                        name: img.name,
                        url: img.data  // base64 data URL
                    };
                });

                // JFCustomWidgetUtils.buildMetadata formats the value so that
                // Jotform's submission view/email knows how to render the images.
                return JFCustomWidgetUtils.buildMetadata('imagelinks', imageLinks);
            }

            // Sends the current image state to the form so Jotform keeps
            // an up-to-date value while the user is still filling in the form.
            function updateWidgetValue() {
                JFCustomWidget.sendData({ value: buildImageMetadata() });
            }

            // --- Widget Initialisation ---

            JFCustomWidget.subscribe("ready", function () {
                isRequired = JFCustomWidget.isWidgetRequired();

                requestResize();

                // Handle form submission
                JFCustomWidget.subscribe("submit", function () {
                    var isValid = true;

                    if (isRequired && uploadedImages.length === 0) {
                        isValid = false;
                        // Show a friendly inline error using the SDK helper
                        JFCustomWidget.showWidgetError(
                            JFCustomWidget.texts.required || "This field is required."
                        );
                    } else {
                        JFCustomWidget.hideWidgetError();
                    }

                    JFCustomWidget.sendSubmit({
                        valid: isValid,
                        value: buildImageMetadata()
                    });
                });

                // Reset images when the form is cleared
                JFCustomWidget.subscribe("clear", function () {
                    uploadedImages = [];
                    currentSlide = 0;
                    updateCarousel();
                });
            });

            // --- Resize Helper ---

            function requestResize() {
                setTimeout(function () {
                    JFCustomWidget.requestFrameResize({
                        height: document.body.scrollHeight + 20
                    });
                }, 100);
            }

            // --- File Upload Handling ---

            var fileInput = document.getElementById('file-input');
            var dropZone = document.getElementById('drop-zone');

            fileInput.addEventListener('change', handleFiles);

            dropZone.addEventListener('dragover', function (e) {
                e.preventDefault();
                dropZone.classList.add('dragover');
            });

            dropZone.addEventListener('dragleave', function () {
                dropZone.classList.remove('dragover');
            });

            dropZone.addEventListener('drop', function (e) {
                e.preventDefault();
                dropZone.classList.remove('dragover');

                if (e.dataTransfer.files.length > 0) {
                    fileInput.files = e.dataTransfer.files;
                    handleFiles({ target: fileInput });
                }
            });

            function handleFiles(e) {
                var files = Array.from(e.target.files).filter(function (f) {
                    return f.type.startsWith('image/');
                });

                if (files.length === 0) return;

                var filesProcessed = 0;

                files.forEach(function (file) {
                    var reader = new FileReader();

                    reader.onload = function (event) {
                        uploadedImages.push({
                            id: Date.now() + Math.random().toString(36).substr(2, 9),
                            name: file.name,
                            type: file.type,
                            size: file.size,
                            data: event.target.result  // base64 data URL
                        });

                        filesProcessed++;
                        if (filesProcessed === files.length) {
                            updateCarousel();
                            updateWidgetValue();
                        }
                    };

                    reader.readAsDataURL(file);
                });

                // Reset so the same file can be re-selected after deletion
                fileInput.value = '';
            }

            // --- Carousel Logic ---

            function updateCarousel() {
                var carousel = document.getElementById('carousel');
                var track = document.getElementById('track');
                var thumbsContainer = document.getElementById('thumbnails');

                if (uploadedImages.length === 0) {
                    carousel.style.display = 'none';
                    thumbsContainer.innerHTML = '';
                    requestResize();
                    return;
                }

                carousel.style.display = 'block';

                // Keep current slide in bounds
                if (currentSlide >= uploadedImages.length) {
                    currentSlide = Math.max(0, uploadedImages.length - 1);
                }

                track.innerHTML = '';
                thumbsContainer.innerHTML = '';

                uploadedImages.forEach(function (img, index) {
                    // Slide
                    var slide = document.createElement('div');
                    slide.className = 'carousel-slide';
                    slide.innerHTML =
                        '<img src="' + img.data + '" alt="' + img.name + '">' +
                        '<button class="btn-delete" title="Remove image" data-index="' + index + '">&times;</button>' +
                        '<div class="slide-info">' + (index + 1) + ' / ' + uploadedImages.length + '</div>';
                    track.appendChild(slide);

                    // Wire up delete button
                    slide.querySelector('.btn-delete').addEventListener('click', function () {
                        deleteImage(parseInt(this.getAttribute('data-index'), 10));
                    });

                    // Thumbnail
                    var thumb = document.createElement('img');
                    thumb.src = img.data;
                    thumb.className = 'thumbnail' + (index === currentSlide ? ' active' : '');
                    thumb.setAttribute('data-index', index);
                    thumb.addEventListener('click', function () {
                        goToSlide(parseInt(this.getAttribute('data-index'), 10));
                    });
                    thumbsContainer.appendChild(thumb);
                });

                var showNav = uploadedImages.length > 1;
                document.getElementById('btn-prev').style.display = showNav ? 'flex' : 'none';
                document.getElementById('btn-next').style.display = showNav ? 'flex' : 'none';

                goToSlide(currentSlide);
                requestResize();
            }

            function moveSlide(direction) {
                var newSlide = currentSlide + direction;
                if (newSlide < 0) newSlide = uploadedImages.length - 1;
                if (newSlide >= uploadedImages.length) newSlide = 0;
                goToSlide(newSlide);
            }

            // Expose moveSlide globally so inline onclick handlers on the nav buttons work
            window.moveSlide = moveSlide;

            function goToSlide(index) {
                currentSlide = index;
                var track = document.getElementById('track');
                track.style.transform = 'translateX(-' + (currentSlide * 100) + '%)';

                document.querySelectorAll('.thumbnail').forEach(function (thumb, i) {
                    thumb.classList.toggle('active', i === currentSlide);
                });
            }

            function deleteImage(index) {
                uploadedImages.splice(index, 1);
                updateCarousel();
                updateWidgetValue();
            }

        })();
    </script>
</body>
</html>
