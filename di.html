<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Single Image Upload Test</title>
    <script src="https://cdn.jotfor.ms/s/umd/latest/for-custom-widgets.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            background: transparent;
        }

        .upload-area {
            border: 2px dashed #c3cad8;
            border-radius: 8px;
            padding: 30px 20px;
            text-align: center;
            background-color: #f8f9fa;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-area:hover {
            border-color: #007bff;
            background-color: #f1f7ff;
        }

        #file-input { display: none; }

        .btn-browse {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
        }

        .preview-container {
            display: none;
            margin-top: 15px;
            text-align: center;
        }

        .preview-container img {
            max-width: 100%;
            max-height: 250px;
            border-radius: 8px;
            object-fit: contain;
        }

        .btn-remove {
            display: block;
            margin: 10px auto 0;
            background: #dc3545;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="upload-area" id="drop-zone">
        <div style="font-size:32px">📸</div>
        <div style="color:#495057;font-size:16px;margin-bottom:8px">Drag & drop an image here</div>
        <button class="btn-browse" onclick="document.getElementById('file-input').click()">Browse Files</button>
        <input type="file" id="file-input" accept="image/*">
    </div>

    <div class="preview-container" id="preview-container">
        <img id="preview-img" src="" alt="Preview">
        <button class="btn-remove" id="btn-remove">Remove</button>
    </div>

    <script>
        (function () {
            var currentDataUri = "";

            JFCustomWidget.subscribe("ready", function () {
                JFCustomWidget.requestFrameResize({ height: document.body.scrollHeight + 20 });

                JFCustomWidget.subscribe("submit", function () {
                    var isValid = !JFCustomWidget.isWidgetRequired() || currentDataUri !== "";

                    if (!isValid) {
                        JFCustomWidget.showWidgetError(JFCustomWidget.texts.required || "This field is required.");
                    } else {
                        JFCustomWidget.hideWidgetError();
                    }

                    JFCustomWidget.sendSubmit({
                        valid: isValid,
                        value: currentDataUri
                    });
                });

                JFCustomWidget.subscribe("clear", function () {
                    clearImage();
                });
            });

            // File input change
            document.getElementById('file-input').addEventListener('change', function (e) {
                var file = e.target.files[0];
                if (!file || !file.type.startsWith('image/')) return;

                var reader = new FileReader();
                reader.onload = function (event) {
                    setImage(event.target.result);
                };
                reader.readAsDataURL(file);
                e.target.value = '';
            });

            // Drag and drop
            var dropZone = document.getElementById('drop-zone');
            dropZone.addEventListener('dragover', function (e) {
                e.preventDefault();
                dropZone.style.borderColor = '#007bff';
            });
            dropZone.addEventListener('dragleave', function () {
                dropZone.style.borderColor = '#c3cad8';
            });
            dropZone.addEventListener('drop', function (e) {
                e.preventDefault();
                dropZone.style.borderColor = '#c3cad8';
                var file = e.dataTransfer.files[0];
                if (!file || !file.type.startsWith('image/')) return;

                var reader = new FileReader();
                reader.onload = function (event) {
                    setImage(event.target.result);
                };
                reader.readAsDataURL(file);
            });

            // Remove button
            document.getElementById('btn-remove').addEventListener('click', function () {
                clearImage();
            });

            function setImage(dataUri) {
                currentDataUri = dataUri;
                document.getElementById('preview-img').src = dataUri;
                document.getElementById('preview-container').style.display = 'block';
                document.getElementById('drop-zone').style.display = 'none';
                JFCustomWidget.sendData({ value: currentDataUri });
                JFCustomWidget.requestFrameResize({ height: document.body.scrollHeight + 20 });
            }

            function clearImage() {
                currentDataUri = "";
                document.getElementById('preview-img').src = '';
                document.getElementById('preview-container').style.display = 'none';
                document.getElementById('drop-zone').style.display = 'block';
                JFCustomWidget.sendData({ value: "" });
                JFCustomWidget.requestFrameResize({ height: document.body.scrollHeight + 20 });
            }
        })();
    </script>
</body>
</html>
