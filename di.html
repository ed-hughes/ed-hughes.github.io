<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Image Metadata Format Test</title>
    <script src="https://cdn.jotfor.ms/s/umd/latest/for-custom-widgets.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            background: transparent;
        }
        p { color: #495057; font-size: 14px; }
        .btn-submit-test {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }
        .btn-submit-test:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <p>This widget submits a hardcoded <code>imagelinks</code> metadata value with a real hosted URL. If the submission view shows the Jotform logo as an image, the format is correct.</p>
    <button class="btn-submit-test" id="btn">Send Test Value</button>

    <script>
        (function () {
            var testValue = JSON.stringify({
                widget_metadata: {
                    type: "imagelinks",
                    value: [
                        {
                            name: "test-image",
                            url: "https://www.jotform.com/resources/assets/logo-nb/min/jotform-logo-orange-400x200.png"
                        }
                    ]
                }
            });

            JFCustomWidget.subscribe("ready", function () {
                JFCustomWidget.requestFrameResize({ height: document.body.scrollHeight + 20 });

                // Pre-fill the value so it's set before submit
                JFCustomWidget.sendData({ value: testValue });

                JFCustomWidget.subscribe("submit", function () {
                    JFCustomWidget.sendSubmit({
                        valid: true,
                        value: testValue
                    });
                });
            });

            // Also allow manually triggering via the button for quick testing
            document.getElementById('btn').addEventListener('click', function () {
                JFCustomWidget.sendData({ value: testValue });
                alert('Test value sent — now submit the form to check the submission view.');
            });
        })();
    </script>
</body>
</html>
