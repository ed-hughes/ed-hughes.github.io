<!doctype html>
<html>
  <head>
    <script src="https://cdn.jotfor.ms/s/umd/latest/for-custom-widgets.js"></script>
    <meta http-equiv="cache-control" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <meta http-equiv="pragma" content="no-cache" />
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-size: 13px;
        padding: 10px;
        background: transparent;
      }
      #file-input { margin-bottom: 10px; display: block; }
      #log {
        margin-top: 10px;
        background: #1e1e1e;
        color: #d4d4d4;
        font-family: monospace;
        font-size: 11px;
        padding: 10px;
        border-radius: 6px;
        white-space: pre-wrap;
        word-break: break-all;
        max-height: 300px;
        overflow-y: auto;
      }
    </style>
  </head>
  <body>
    <input type="file" id="file-input" accept="image/*" disabled>
    <div id="log">Waiting for ready event...</div>

    <script type="text/javascript">
      (function () {
        var uploadServerURL = null;
        var formID = null;
        var qid = null;

        function log(label, data) {
          var el = document.getElementById('log');
          var time = new Date().toISOString().split('T')[1].replace('Z', '');
          var value = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
          el.innerHTML += '\n[' + time + '] <b style="color:#569cd6">' + label + '</b>: ' + value;
          el.scrollTop = el.scrollHeight;
          console.log('[' + label + ']', data);
        }

        JFCustomWidget.subscribe("ready", function (data) {
          log('ready', {
            uploadServerURL: data.uploadServerURL,
            formID: data.formID,
            qid: data.qid,
            value: data.value
          });

          uploadServerURL = data.uploadServerURL;
          formID = data.formID;
          qid = data.qid;

          var fileInput = document.getElementById('file-input');
          fileInput.disabled = false;

          fileInput.addEventListener('change', function (e) {
            var file = e.target.files[0];
            if (!file) return;
            log('file-selected', { name: file.name, type: file.type, size: file.size });
            uploadFile(file);
          });

          JFCustomWidget.subscribe("submit", function () {
            JFCustomWidget.sendSubmit({ valid: true, value: "test" });
          });

          JFCustomWidget.requestFrameResize({ height: document.body.scrollHeight + 20 });
        });

        function uploadFile(file) {
          if (!uploadServerURL) {
            log('error', 'No uploadServerURL available');
            return;
          }

          log('uploading', 'POST to ' + uploadServerURL);

          var formData = new FormData();
          formData.append('formID', formID);
          formData.append('qid', qid);
          formData.append('file', file, file.name);

          fetch(uploadServerURL, {
            method: 'POST',
            body: formData
          })
          .then(function (response) {
            log('response-status', response.status + ' ' + response.statusText);
            // Log all response headers
            var headers = {};
            response.headers.forEach(function (val, key) { headers[key] = val; });
            log('response-headers', headers);
            return response.text();
          })
          .then(function (text) {
            log('response-body-raw', text);
            // Also try parsing as JSON in case it is
            try {
              var json = JSON.parse(text);
              log('response-body-parsed', json);
            } catch (e) {
              log('response-body-not-json', 'Could not parse as JSON');
            }
            JFCustomWidget.requestFrameResize({ height: document.body.scrollHeight + 20 });
          })
          .catch(function (err) {
            log('fetch-error', err.toString());
            JFCustomWidget.requestFrameResize({ height: document.body.scrollHeight + 20 });
          });
        }
      })();
    </script>
  </body>
</html>
