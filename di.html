<!doctype html>
<html>
  <head>
    <script src="https://cdn.jotfor.ms/s/umd/latest/for-custom-widgets.js"></script>
    <meta http-equiv="cache-control" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <meta http-equiv="pragma" content="no-cache" />
  </head>
  <style></style>
  <body>
    <div id="reviewArea">
      <label for="pet-select">Choose a pet:</label>
      <select name="pets" id="pet-select">
        <option value="">--Please choose an option--</option>
        <option value="dog">Dog</option>
        <option value="cat">Cat</option>
        <option value="hamster">Hamster</option>
        <option value="parrot">Parrot</option>
        <option value="spider">Spider</option>
        <option value="goldfish">Goldfish</option>
      </select>
    </div>

    <!-- On-screen log panel -->
    <div id="log" style="margin-top:12px;background:#1e1e1e;color:#d4d4d4;font-family:monospace;font-size:11px;padding:10px;border-radius:6px;white-space:pre-wrap;word-break:break-all;max-height:250px;overflow-y:auto;">Waiting for events...</div>

    <script type="text/javascript">
      function log(event, data) {
        var el = document.getElementById('log');
        var time = new Date().toISOString().split('T')[1].replace('Z', '');
        el.innerHTML += '\n[' + time + '] <b style="color:#569cd6">' + event + '</b>: ' + JSON.stringify(data, null, 2);
        el.scrollTop = el.scrollHeight;
        console.log('[' + event + ']', data);
      }

      function PopulateEventExample() {
        this.init = init;
        this.getData = getData;
        this.handlePopulateEvent = handlePopulateEvent;

        function init(formData) {
          log('init', formData);
        }

        function handlePopulateEvent(data) {
          log('populate', data);
          document.getElementById("pet-select").value = data.value;
        }

        function getData() {
          return {
            valid: true,
            value: "TEST"
          };
        }
      }

      JFCustomWidget.subscribe("ready", function (data) {
        log('ready', data);

        var widget = new PopulateEventExample();
        widget.init(data);

        JFCustomWidget.subscribe("submit", function () {
          log('submit', { triggered: true });
          JFCustomWidget.sendSubmit(widget.getData());
        });

        JFCustomWidget.subscribe("populate", function (data) {
          log('populate', data);
          widget.handlePopulateEvent(data);
        });

        JFCustomWidget.subscribe("clear", function (data) {
          log('clear', data);
        });
      });
    </script>
  </body>
</html>
