    <script type="text/javascript">
      function PopulateEventExample() {
        // get widget parameters if any using getWidgetSettings for all, or getWidgetSetting('name') for a specific one.
        // const params = JFCustomWidget.getWidgetSettings();

        // exposed functions
        this.init = init;
        this.getData = getData;
        this.handlePopulateEvent = handlePopulateEvent;

        function init(formData) {
          console.log("iFrame init");
        }

        function handlePopulateEvent(data){
          console.log("handlePopulateEvent", data)
          const allowedZips = new Set(["12345"])
          if(!allowedZips.has(data.value)){
            //sendData is to send the data back to Jotform live, eg here to use in a condition
            JFCustomWidget.sendData(widget.getData());
          }
        }


  function getData() {
    return {
      valid: true,
      value: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAIAAAD8GO2jAAAARklEQVR4nGLJunGSgRTwPFWLJPVMJKkmA4xaMGrBqAWjFoxaQA3AIin+gSQN62P/kKR+6AfRqAWjFoxaMGrBiLAAEAAA//+tKgbuF0gCMQAAAABJRU5ErkJggg=="
    };
  }
}
      }

      // always subscribe to ready event and implement widget related code
      // inside callback function , it is the best practice while developing widgets
      JFCustomWidget.subscribe("ready", function (data) {
        var widget = new PopulateEventExample();
        widget.init(data);

        JFCustomWidget.subscribe("submit", function () {
          JFCustomWidget.sendSubmit(widget.getData());
        });

        JFCustomWidget.subscribe("populate", function (data) {
          widget.handlePopulateEvent(data);
        });
      });
    </script>
